
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ficha Cadastral</title>
</head>

<body>

    <form action="Instritos.html"></form>

<h2 align="center">Ficha Cadastral</h2>

<form>
<fieldset>

<table width="500" border="0" cellspacing="1" cellpadding="1"
style="font-family: Arial; font-size: 12px;">

<tr>
<td>Nome:</td>
<td><input type="text" size="55"></td>
</tr>

<tr>
<td>RG:</td>
<td><input type="text" size="13"></td>
</tr>

<tr>
<td>C.P.F.:</td>
<td><input type="text" size="13"></td>
</tr>

<tr>
<td>Endereço:</td>
<td><input type="text" size="55"></td>
</tr>

<tr>
<td>Sexo:</td>
<td>
<select>
<option>Masculino</option>
<option>Feminino</option>
</select>
</td>
</tr>

<tr>
<td>Data Nascimento:</td>
<td><input type="text" size="13"></td>
</tr>

<tr>
<td>Situação Civil</td>
<td>
<input type="radio" name="civil"> Solteiro(a)
<input type="radio" name="civil"> Casado(a)
<input type="radio" name="civil"> Viúvo(a)
</td>
</tr>

<tr>
<td></td>
<td align="center">

<input type="button" value = "Salvar">
<input type="reset" value="Limpar Dados">

</td>
</tr>

</table>

</form>
</fieldset>

</body>
</html>
