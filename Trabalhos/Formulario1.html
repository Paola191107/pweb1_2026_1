<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/action_page.html">
<fieldset>
<legend><strong>Formulário Matricula de Curso</strong></legend>
<form>
<label for="pnome">Primeiro nome:</label><br>
<input type="text" id="pnome" name="pnome"><br>
<label for="unome">Sobrenome:</label><br>
<input type="text" id="unome" name="unome">


<p><strong>Cursos</strong></p>

<input type="radio" id="Tecnico em informática" name="fav_language" value="Tecnico em informática">
<label for="Tecnico em informática">Tecnico em informática </label><br>
<input type="radio" id="Graduação- Análise e Desenvolvimento de sistema" name="fav_language" value="Graduação- Análise e Desenvolvimento de sistema">
<label for="Graduação- Análise e Desenvolvimento de sistema">Graduação- Análise e Desenvolvimento de sistema</label><br>
<input type="radio" id="Profissionalidade- Programação Wed" name="fav_language" value="Profissionalidade- Programação Wed">
<label for="Profissionalidade- Programação Wed">Profissionalidade- Programação Wed</label>


<p><strong>Linguiagem de Programação de sua Preferencia:</strong></p>

<input type="checkbox" id="vehicle1" name="vehicle1" value="PHP">
<label for="vehicle1"> PHP</label><br>
<input type="checkbox" id="vehicle2" name="vehicle2" value="java">
<label for="vehicle2"> java</label><br>
<input type="checkbox" id="vehicle3" name="vehicle3" value="Python">
<label for="vehicle3"> Python</label>

<p><strong>Escolha um turno:</strong></p>


<select name="turno" id="turno">
<option value="Manhã">Manhã</option>
<option value="Tarde">Tarde</option>
<option value="Noite">Noite</option>
<option value="Madrugada">Madrugada</option>
</select>

<p></p>

<p><strong>Escolha uma unidade mais proxima de você</strong></p>
<input list="campus" name="campus" id="campus">
<datalist id="campus">
<option value="Chapecó">
<option value="Palhoça">
<option value="Caçador">
<option value="Lages">
<option value="São Miguel">
</datalist>

<input type="submit" value ="Enviar">

</fieldset>
</form>
    
</body>
</html>
