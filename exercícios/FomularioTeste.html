<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Matrícula Escolar</title>
</head>

<body>

<h2>Formulário de Matrícula Escolar</h2>

<form action="sucesso.html">

<!-- DADOS PESSOAIS -->
<fieldset>
<legend>Dados do Aluno</legend>

<label>Nome do Aluno:</label><br>
<input type="text" maxlength="50" required size="40"><br><br>

<label>Data de Nascimento:</label><br>
<input type="date" required><br><br>

<label>E-mail:</label><br>
<input type="email" required size="40"><br><br>

<label>Telefone:</label><br>
<input type="tel" maxlength="13" required 
placeholder="DDD + número + ramal"><br><br>

</fieldset>

<br>

<!-- DADOS ESCOLARES -->
<fieldset>
<legend>Informações Escolares</legend>

<label>Série:</label><br>
<select required>
<option value="">Selecione</option>
<option>1º Ano do Ensino Médio</option>
<option>2º Ano do Ensino Médio</option>
<option>3º Ano do Ensino Médio</option>
<option>4º Ano do Ensino Médio</option>
</select>

<br><br>

<label>Turno Preferencial:</label><br>
<input type="radio" name="turno" required> Manhã
<input type="radio" name="turno"> Tarde
<input type="radio" name="turno"> Noite

</fieldset>

<br>

<!-- ATIVIDADES -->
<fieldset>
<legend>Atividades Extra-curriculares</legend>

<input type="checkbox" required> Teatro<br>
<input type="checkbox"> Música<br>
<input type="checkbox"> Ballet<br>
<input type="checkbox"> Pintura<br>
<input type="checkbox"> Judô<br>
<input type="checkbox"> Futebol<br>

</fieldset>

<br>

<input type="submit" value="Enviar Matrícula">

</form>

</body>
</html>
